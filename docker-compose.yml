services:
  postgres:
    image: postgres:16-alpine
    container_name: rakshak-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rakshak_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-rakshak}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rakshak}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: rakshak-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-rakshak_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
